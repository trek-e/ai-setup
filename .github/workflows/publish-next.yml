name: Publish next to npm

on:
  push:
    branches: [next]

jobs:
  publish-next:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Smoke test build
        run: |
          node dist/bin.js --version
          node dist/bin.js --help

      - name: Determine pre-release version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            BASE_VERSION=$(node -p "require('./package.json').version")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s")

            if [ -z "$COMMITS" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "No new commits since ${LAST_TAG}"
              exit 0
            fi

            BUMP="patch"
            if echo "$COMMITS" | grep -qE "^.+!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP="minor"
            fi

            npm version "$BUMP" --no-git-tag-version
            BASE_VERSION=$(node -p "require('./package.json').version")
          fi

          TIMESTAMP=$(date +%s)
          NEW_VERSION="${BASE_VERSION}-dev.${TIMESTAMP}"

          npm version "$NEW_VERSION" --no-git-tag-version
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${NEW_VERSION} to @dev"

      - name: Publish with dev tag
        if: steps.version.outputs.skip != 'true'
        run: npm publish --access public --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
